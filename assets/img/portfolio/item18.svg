<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e" rx="12"/>
  <!-- PDF drawing background -->
  <rect x="40" y="30" width="340" height="280" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <!-- Grid lines on drawing -->
  <line x1="40" y1="80" x2="380" y2="80" stroke="#e9ecef" stroke-width="0.5"/>
  <line x1="40" y1="130" x2="380" y2="130" stroke="#e9ecef" stroke-width="0.5"/>
  <line x1="40" y1="180" x2="380" y2="180" stroke="#e9ecef" stroke-width="0.5"/>
  <line x1="40" y1="230" x2="380" y2="230" stroke="#e9ecef" stroke-width="0.5"/>
  <line x1="140" y1="30" x2="140" y2="310" stroke="#e9ecef" stroke-width="0.5"/>
  <line x1="240" y1="30" x2="240" y2="310" stroke="#e9ecef" stroke-width="0.5"/>
  <line x1="340" y1="30" x2="340" y2="310" stroke="#e9ecef" stroke-width="0.5"/>
  <!-- Duct rectangles detected -->
  <rect x="70" y="60" width="120" height="30" fill="none" stroke="#1abc9c" stroke-width="2.5" rx="2"/>
  <rect x="200" y="100" width="150" height="25" fill="none" stroke="#1abc9c" stroke-width="2.5" rx="2"/>
  <rect x="90" y="160" width="100" height="35" fill="none" stroke="#e74c3c" stroke-width="2.5" rx="2" stroke-dasharray="4,2"/>
  <!-- Selected duct highlight -->
  <circle cx="90" cy="160" r="5" fill="#e74c3c"/>
  <circle cx="190" cy="160" r="5" fill="#e74c3c"/>
  <circle cx="90" cy="195" r="5" fill="#e74c3c"/>
  <circle cx="190" cy="195" r="5" fill="#e74c3c"/>
  <!-- Diagonal pipe -->
  <line x1="250" y1="170" x2="350" y2="250" stroke="#1abc9c" stroke-width="2.5"/>
  <rect x="240" y="165" width="120" height="90" fill="none" stroke="#1abc9c" stroke-width="1.5" rx="2" opacity="0.4"/>
  <!-- Vertical duct -->
  <rect x="310" y="50" width="28" height="90" fill="none" stroke="#1abc9c" stroke-width="2.5" rx="2"/>
  <!-- Measurement labels -->
  <text x="105" y="55" font-family="monospace" font-size="9" fill="#1abc9c" text-anchor="middle">12'-6"</text>
  <text x="275" y="95" font-family="monospace" font-size="9" fill="#1abc9c" text-anchor="middle">18'-3"</text>
  <text x="140" y="155" font-family="monospace" font-size="9" fill="#e74c3c" text-anchor="middle">8'-0"</text>
  <!-- Title block -->
  <rect x="40" y="280" width="340" height="30" fill="#2c3e50" rx="0 0 6 6"/>
  <text x="210" y="300" font-family="Arial,sans-serif" font-size="10" fill="#fff" text-anchor="middle">MECHANICAL FLOOR PLAN — SCALE: 1/4" = 1'-0"</text>
  <!-- Sidebar panel -->
  <rect x="410" y="30" width="160" height="280" rx="8" fill="#16213e" stroke="rgba(26,188,156,0.3)" stroke-width="1"/>
  <text x="490" y="55" font-family="Arial,sans-serif" font-size="12" fill="#1abc9c" text-anchor="middle" font-weight="bold">DuctVision</text>
  <line x1="425" y1="65" x2="555" y2="65" stroke="rgba(26,188,156,0.2)" stroke-width="1"/>
  <!-- Detect button -->
  <rect x="425" y="78" width="130" height="28" rx="14" fill="#1abc9c"/>
  <text x="490" y="96" font-family="Arial,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">🔍 Detect Pipes</text>
  <!-- Stats -->
  <text x="430" y="128" font-family="Arial,sans-serif" font-size="9" fill="#8899aa">Pipes Found</text>
  <text x="545" y="128" font-family="monospace" font-size="11" fill="#1abc9c" text-anchor="end" font-weight="bold">14</text>
  <text x="430" y="148" font-family="Arial,sans-serif" font-size="9" fill="#8899aa">Total Length</text>
  <text x="545" y="148" font-family="monospace" font-size="11" fill="#1abc9c" text-anchor="end" font-weight="bold">186'-9"</text>
  <text x="430" y="168" font-family="Arial,sans-serif" font-size="9" fill="#8899aa">Scale</text>
  <text x="545" y="168" font-family="monospace" font-size="11" fill="#1abc9c" text-anchor="end" font-weight="bold">1/4"=1'</text>
  <line x1="425" y1="178" x2="555" y2="178" stroke="rgba(26,188,156,0.2)" stroke-width="1"/>
  <!-- Selected pipe info -->
  <text x="430" y="196" font-family="Arial,sans-serif" font-size="9" fill="#e74c3c" font-weight="bold">Selected Pipe #3</text>
  <text x="430" y="214" font-family="Arial,sans-serif" font-size="8" fill="#8899aa">Length: 8'-0"</text>
  <text x="430" y="228" font-family="Arial,sans-serif" font-size="8" fill="#8899aa">Width: 24"</text>
  <text x="430" y="242" font-family="Arial,sans-serif" font-size="8" fill="#8899aa">Angle: 0°</text>
  <!-- Action buttons -->
  <rect x="425" y="258" width="60" height="22" rx="4" fill="rgba(26,188,156,0.15)" stroke="#1abc9c" stroke-width="0.8"/>
  <text x="455" y="273" font-family="Arial,sans-serif" font-size="8" fill="#1abc9c" text-anchor="middle">Update</text>
  <rect x="495" y="258" width="60" height="22" rx="4" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="0.8"/>
  <text x="525" y="273" font-family="Arial,sans-serif" font-size="8" fill="#e74c3c" text-anchor="middle">Delete</text>
  <!-- Bottom tech icons -->
  <text x="300" y="345" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">FastAPI · OpenCV · React · Tesseract OCR</text>
  <!-- Decorative corner brackets -->
  <path d="M25,20 L25,10 L35,10" fill="none" stroke="rgba(26,188,156,0.3)" stroke-width="1.5"/>
  <path d="M575,20 L575,10 L565,10" fill="none" stroke="rgba(26,188,156,0.3)" stroke-width="1.5"/>
  <path d="M25,380 L25,390 L35,390" fill="none" stroke="rgba(26,188,156,0.3)" stroke-width="1.5"/>
  <path d="M575,380 L575,390 L565,390" fill="none" stroke="rgba(26,188,156,0.3)" stroke-width="1.5"/>
</svg>
