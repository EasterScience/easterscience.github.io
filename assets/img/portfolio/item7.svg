  <line x1="350" y1="300" x2="350" y2="380" stroke="#1abc9c" stroke-width="1.5" opacity="0.4"/>
  <line x1="350" y1="380" x2="500" y2="380" stroke="#1abc9c" stroke-width="1.5" opacity="0.4"/>
  <!-- Email icon -->
  <rect x="200" y="310" width="140" height="80" rx="6" fill="#2c3e50" stroke="#f39c12" stroke-width="1"/>
  <polyline points="205,315 270,355 335,315" fill="none" stroke="#f39c12" stroke-width="1.5" opacity="0.5"/>
  <text x="270" y="375" font-family="Lato, sans-serif" font-size="8" fill="#fff" text-anchor="middle" opacity="0.4">Bank Statement</text>
  <!-- Title -->
  <text x="450" y="540" font-family="Montserrat, Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="700">CC Bill Reminder</text>
  <text x="450" y="575" font-family="Lato, Arial, sans-serif" font-size="16" fill="#1abc9c" text-anchor="middle">Python · MySQL · Email Parsing</text>
