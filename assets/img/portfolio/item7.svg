  <text x="760" y="175" font-family="Montserrat, sans-serif" font-size="12" fill="#e74c3c" text-anchor="end" font-weight="700">$2,450</text>
  <rect x="520" y="215" width="280" height="55" rx="6" fill="#2c3e50" stroke="#e74c3c" stroke-width="1"/>
  <circle cx="545" cy="242" r="12" fill="#e74c3c" opacity="0.3"/>
  <text x="545" y="246" font-family="sans-serif" font-size="7" fill="#e74c3c" text-anchor="middle">MC</text>
  <text x="575" y="235" font-family="Lato, sans-serif" font-size="10" fill="#fff" opacity="0.6">**** 8832</text>
