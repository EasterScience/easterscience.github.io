  <text x="760" y="240" font-family="Montserrat, sans-serif" font-size="12" fill="#e74c3c" text-anchor="end" font-weight="700">$1,200</text>
  <rect x="520" y="280" width="280" height="55" rx="6" fill="#2c3e50" stroke="#9b59b6" stroke-width="1"/>
  <circle cx="545" cy="307" r="12" fill="#9b59b6" opacity="0.3"/>
  <text x="545" y="311" font-family="sans-serif" font-size="7" fill="#9b59b6" text-anchor="middle">AMEX</text>
  <text x="575" y="300" font-family="Lato, sans-serif" font-size="10" fill="#fff" opacity="0.6">**** 1190</text>
  <text x="575" y="315" font-family="Lato, sans-serif" font-size="9" fill="#2ecc71">Due: 25 days</text>
  <text x="760" y="305" font-family="Montserrat, sans-serif" font-size="12" fill="#e74c3c" text-anchor="end" font-weight="700">$890</text>
