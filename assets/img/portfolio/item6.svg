<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#1b2838"/>
    </linearGradient>
  </defs>
  <rect width="900" height="650" fill="url(#bg6)"/>
  <!-- OpenVMS server (left) -->
  <rect x="80" y="160" width="250" height="280" rx="10" fill="#2c3e50" stroke="#e74c3c" stroke-width="2"/>
  <rect x="80" y="160" width="250" height="40" rx="10" fill="#e74c3c" opacity="0.6"/>
  <text x="205" y="185" font-family="Montserrat, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">OpenVMS</text>
  <!-- Terminal lines -->
  <text x="100" y="225" font-family="monospace" font-size="10" fill="#e74c3c" opacity="0.6">$ SET DEFAULT</text>
  <text x="100" y="242" font-family="monospace" font-size="10" fill="#fff" opacity="0.3">SYS$DISK:[USER]</text>
  <text x="100" y="262" font-family="monospace" font-size="10" fill="#e74c3c" opacity="0.6">$ SHOW SYSTEM</text>
  <text x="100" y="282" font-family="monospace" font-size="10" fill="#e74c3c" opacity="0.6">$ MUMPS ^ROUTINE</text>
  <text x="100" y="302" font-family="monospace" font-size="10" fill="#fff" opacity="0.3">W "Hello",!</text>
  <text x="100" y="322" font-family="monospace" font-size="10" fill="#e74c3c" opacity="0.6">$ SUBMIT/QUEUE</text>
  <text x="100" y="342" font-family="monospace" font-size="10" fill="#fff" opacity="0.3">JOB_BATCH.COM</text>
  <!-- Big arrow -->
  <line x1="360" y1="300" x2="520" y2="300" stroke="#1abc9c" stroke-width="3" opacity="0.6"/>
  <polygon points="515,290 535,300 515,310" fill="#1abc9c" opacity="0.6"/>
  <!-- Gear icon on arrow -->
  <circle cx="440" cy="300" r="25" fill="#1abc9c" opacity="0.1" stroke="#1abc9c" stroke-width="1.5"/>
  <text x="440" y="296" font-family="Lato, sans-serif" font-size="8" fill="#1abc9c" text-anchor="middle">Python</text>
  <text x="440" y="310" font-family="Lato, sans-serif" font-size="8" fill="#1abc9c" text-anchor="middle">Convert</text>
  <!-- AWS cloud (right) -->
  <rect x="560" y="160" width="260" height="280" rx="10" fill="#2c3e50" stroke="#f39c12" stroke-width="2"/>
  <rect x="560" y="160" width="260" height="40" rx="10" fill="#f39c12" opacity="0.6"/>
  <text x="690" y="185" font-family="Montserrat, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">AWS Cloud</text>
  <!-- Object Script code -->
  <text x="580" y="225" font-family="monospace" font-size="10" fill="#2ecc71" opacity="0.6">ClassMethod Run()</text>
  <text x="580" y="242" font-family="monospace" font-size="10" fill="#fff" opacity="0.3">{</text>
  <text x="595" y="262" font-family="monospace" font-size="10" fill="#3498db" opacity="0.6">Set dir = ##class</text>
  <text x="595" y="282" font-family="monospace" font-size="10" fill="#3498db" opacity="0.6">(%File).Dir()</text>
  <text x="595" y="302" font-family="monospace" font-size="10" fill="#2ecc71" opacity="0.6">Write "Hello",!</text>
  <text x="595" y="322" font-family="monospace" font-size="10" fill="#3498db" opacity="0.6">Do ##class</text>
  <text x="595" y="342" font-family="monospace" font-size="10" fill="#3498db" opacity="0.6">(%Task).Submit()</text>
  <text x="580" y="362" font-family="monospace" font-size="10" fill="#fff" opacity="0.3">}</text>
  <!-- Cloud icon -->
  <ellipse cx="690" cy="420" rx="50" ry="20" fill="#f39c12" opacity="0.15"/>
  <ellipse cx="670" cy="410" rx="30" ry="18" fill="#f39c12" opacity="0.1"/>
  <ellipse cx="710" cy="408" rx="25" ry="16" fill="#f39c12" opacity="0.1"/>
  <!-- Title -->
  <text x="450" y="510" font-family="Montserrat, Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="700">OpenVMS to AWS Migration</text>
  <text x="450" y="545" font-family="Lato, Arial, sans-serif" font-size="16" fill="#1abc9c" text-anchor="middle">Linux · Object Script · Python</text>
</svg>