  <circle cx="700" cy="450" r="30" fill="none" stroke="#9b59b6" stroke-width="2" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="340" y1="220" x2="410" y2="320" stroke="#1abc9c" stroke-width="1.5" opacity="0.5"/>
  <line x1="560" y1="220" x2="490" y2="320" stroke="#e74c3c" stroke-width="1.5" opacity="0.5"/>
  <line x1="420" y1="390" x2="230" y2="440" stroke="#3498db" stroke-width="1.5" opacity="0.5"/>
  <line x1="480" y1="390" x2="670" y2="440" stroke="#3498db" stroke-width="1.5" opacity="0.5"/>
