  <circle cx="300" cy="200" r="5" fill="#1abc9c"/>
  <circle cx="600" cy="200" r="5" fill="#e74c3c"/>
  <circle cx="450" cy="350" r="5" fill="#3498db"/>
  <circle cx="200" cy="450" r="5" fill="#f39c12"/>
  <circle cx="700" cy="450" r="5" fill="#9b59b6"/>
  <!-- Title -->
  <text x="450" y="560" font-family="Montserrat, Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="700">Distribution Management</text>
  <text x="450" y="595" font-family="Lato, Arial, sans-serif" font-size="16" fill="#1abc9c" text-anchor="middle">Django · SQL · Redis · Graph API</text>
