  <rect x="285" y="185" width="30" height="30" rx="3" fill="#1abc9c" opacity="0.6"/>
  <rect x="288" y="188" width="8" height="8" rx="1" fill="#1a1a2e"/>
  <rect x="300" y="188" width="8" height="8" rx="1" fill="#1a1a2e"/>
  <rect x="288" y="200" width="8" height="8" rx="1" fill="#1a1a2e"/>
  <rect x="300" y="200" width="8" height="8" rx="1" fill="#1a1a2e"/>
  <!-- Chart icon in center -->
  <rect x="430" y="360" width="8" height="25" rx="2" fill="#3498db" opacity="0.8"/>
  <rect x="442" y="345" width="8" height="40" rx="2" fill="#3498db" opacity="0.8"/>
  <rect x="454" y="352" width="8" height="33" rx="2" fill="#3498db" opacity="0.8"/>
  <rect x="466" y="340" width="8" height="45" rx="2" fill="#3498db" opacity="0.8"/>
