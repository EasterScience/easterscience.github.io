<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="650" fill="url(#bg12)"/>
  <!-- Grid/network pattern -->
  <line x1="100" y1="150" x2="800" y2="150" stroke="#1abc9c" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="250" x2="800" y2="250" stroke="#1abc9c" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="350" x2="800" y2="350" stroke="#1abc9c" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="450" x2="800" y2="450" stroke="#1abc9c" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="100" x2="200" y2="550" stroke="#1abc9c" stroke-width="0.5" opacity="0.2"/>
  <line x1="400" y1="100" x2="400" y2="550" stroke="#1abc9c" stroke-width="0.5" opacity="0.2"/>
  <line x1="600" y1="100" x2="600" y2="550" stroke="#1abc9c" stroke-width="0.5" opacity="0.2"/>
  <!-- Distribution nodes -->
  <circle cx="300" cy="200" r="40" fill="none" stroke="#1abc9c" stroke-width="2" opacity="0.8"/>
